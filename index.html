<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ממיר מטבעות ושטחים</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #ffffff;
    --bg2: #f5f5f3;
    --bg3: #eeecea;
    --text: #1a1a18;
    --text2: #6b6a66;
    --text3: #9b9a97;
    --border: rgba(0,0,0,0.12);
    --border2: rgba(0,0,0,0.22);
    --info: #185fa5;
    --radius: 12px;
    --radius-sm: 8px;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #1e1e1c;
      --bg2: #2a2a28;
      --bg3: #333331;
      --text: #f0efe8;
      --text2: #a0a09a;
      --text3: #6b6a66;
      --border: rgba(255,255,255,0.12);
      --border2: rgba(255,255,255,0.22);
      --info: #85b7eb;
    }
  }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif;
    background: var(--bg3);
    color: var(--text);
    min-height: 100vh;
    padding: 1.5rem 1rem 3rem;
  }
  .app {
    max-width: 680px;
    margin: 0 auto;
  }
  h1 {
    font-size: 22px;
    font-weight: 500;
    margin-bottom: 1.5rem;
    color: var(--text);
  }
  .tabs {
    display: flex;
    gap: 8px;
    border-bottom: 0.5px solid var(--border);
    margin-bottom: 1.5rem;
  }
  .tab {
    padding: 8px 20px;
    font-size: 14px;
    font-weight: 500;
    border: none;
    background: none;
    cursor: pointer;
    color: var(--text2);
    border-bottom: 2px solid transparent;
    margin-bottom: -1px;
    transition: color 0.15s;
    font-family: inherit;
  }
  .tab.active { color: var(--text); border-bottom-color: var(--text); }
  .panel { display: none; }
  .panel.active { display: block; }
  .card {
    background: var(--bg);
    border: 0.5px solid var(--border);
    border-radius: var(--radius);
    padding: 1.25rem 1.5rem;
    margin-bottom: 1rem;
  }
  .row {
    display: flex;
    align-items: flex-end;
    gap: 12px;
    margin-bottom: 1rem;
  }
  .field { flex: 1; display: flex; flex-direction: column; gap: 6px; }
  label {
    font-size: 11px;
    color: var(--text2);
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }
  input[type=number], select {
    width: 100%;
    padding: 8px 12px;
    font-size: 15px;
    background: var(--bg2);
    border: 0.5px solid var(--border);
    border-radius: var(--radius-sm);
    color: var(--text);
    font-family: inherit;
    height: 40px;
    appearance: none;
    -webkit-appearance: none;
  }
  input[type=number]:focus, select:focus {
    outline: none;
    border-color: var(--border2);
  }
  .swap-btn {
    width: 36px;
    height: 40px;
    border: 0.5px solid var(--border2);
    border-radius: 50%;
    background: var(--bg2);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 16px;
    flex-shrink: 0;
    transition: background 0.15s;
    color: var(--text);
    font-family: inherit;
  }
  .swap-btn:hover { background: var(--bg3); }
  .result-box {
    background: var(--bg2);
    border-radius: var(--radius-sm);
    padding: 1rem 1.25rem;
    display: flex;
    flex-direction: column;
    gap: 4px;
  }
  .result-label { font-size: 12px; color: var(--text2); }
  .result-value { font-size: 26px; font-weight: 500; color: var(--text); }
  .result-sub { font-size: 12px; color: var(--text3); }
  .rate-row {
    display: flex;
    justify-content: space-between;
    font-size: 12px;
    color: var(--text3);
    margin-top: 4px;
  }
  .source-tag {
    font-size: 11px;
    color: var(--text3);
    margin-top: 0.75rem;
    text-align: left;
  }
  .source-tag a { color: var(--info); text-decoration: none; }
  .source-tag a:hover { text-decoration: underline; }
  .quick-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(145px, 1fr));
    gap: 10px;
  }
  .quick-card {
    background: var(--bg);
    border: 0.5px solid var(--border);
    border-radius: var(--radius);
    padding: 0.75rem 1rem;
    cursor: pointer;
    transition: background 0.15s;
  }
  .quick-card:hover { background: var(--bg2); }
  .quick-title { font-size: 11px; color: var(--text2); margin-bottom: 2px; }
  .quick-val { font-size: 16px; font-weight: 500; }
  .quick-sub { font-size: 11px; color: var(--text3); }
  .status { font-size: 13px; color: var(--text2); text-align: center; padding: 1rem; }
  .err { color: #e24b4a; font-size: 13px; text-align: center; padding: 0.5rem; }
  @media(max-width:480px){
    .row { flex-wrap: wrap; }
    .swap-btn { align-self: center; }
  }
</style>
</head>
<body>
<div class="app">
  <h1>ממיר מטבעות ושטחים</h1>
  <div class="tabs">
    <button class="tab active" onclick="switchTab('currency')">המרת מטבעות</button>
    <button class="tab" onclick="switchTab('area')">המרת שטחים</button>
  </div>

  <!-- Currency Panel -->
  <div id="panel-currency" class="panel active">
    <div class="card">
      <div class="row">
        <div class="field">
          <label>סכום</label>
          <input type="number" id="c-amount" value="100" min="0" step="any" oninput="convertCurrency()">
        </div>
        <div class="field">
          <label>ממטבע</label>
          <select id="c-from" onchange="convertCurrency()"></select>
        </div>
        <button class="swap-btn" onclick="swapCurrency()" title="החלף">⇄</button>
        <div class="field">
          <label>למטבע</label>
          <select id="c-to" onchange="convertCurrency()"></select>
        </div>
      </div>
      <div class="result-box">
        <div class="result-label" id="c-res-label">תוצאה</div>
        <div class="result-value" id="c-result"><span class="status">טוען שערי חליפין...</span></div>
        <div class="rate-row">
          <span id="c-rate-info"></span>
          <span id="c-updated"></span>
        </div>
      </div>
      <div class="source-tag">
        מקור שערים: <a href="https://github.com/fawazahmed0/exchange-api" target="_blank">fawazahmed0/exchange-api</a> via jsDelivr CDN &nbsp;|&nbsp; עדכון יומי, ללא מפתח API
      </div>
    </div>
    <div class="quick-grid" id="quick-rates"></div>
  </div>

  <!-- Area Panel -->
  <div id="panel-area" class="panel">
    <div class="card">
      <div class="row">
        <div class="field">
          <label>ערך</label>
          <input type="number" id="a-amount" value="1" min="0" step="any" oninput="convertArea()">
        </div>
        <div class="field">
          <label>מיחידה</label>
          <select id="a-from" onchange="convertArea()"></select>
        </div>
        <button class="swap-btn" onclick="swapArea()" title="החלף">⇄</button>
        <div class="field">
          <label>ליחידה</label>
          <select id="a-to" onchange="convertArea()"></select>
        </div>
      </div>
      <div class="result-box">
        <div class="result-label" id="a-res-label">תוצאה</div>
        <div class="result-value" id="a-result">—</div>
        <div class="result-sub" id="a-formula"></div>
      </div>
    </div>
    <div class="quick-grid" id="quick-areas"></div>
  </div>
</div>

<script>
const CURRENCIES = {
  USD:'דולר אמריקאי',ILS:'שקל ישראלי',EUR:'אירו',GBP:'לירה שטרלינג',
  JPY:'ין יפני',CNY:'יואן סיני',CAD:'דולר קנדי',AUD:'דולר אוסטרלי',
  CHF:'פרנק שוויצרי',INR:'רופי הודי',BRL:'ריאל ברזילאי',RUB:'רובל רוסי',
  KRW:'וון דרום קוריאה',MXN:'פזו מקסיקני',SGD:'דולר סינגפורי',
  AED:'דירהם אמירויות',SAR:'ריאל סעודי',TRY:'לירה טורקית',
  SEK:'כרונה שוודית',NOK:'כרונה נורווגית',DKK:'כרונה דנית',
  PLN:'זלוטי פולני',CZK:'קורונה צ\'כית',HUF:'פורינט הונגרי',
  THB:'בהט תאילנדי',ZAR:'ראנד דרום אפריקאי'
};

const AREA_UNITS = [
  {id:'sqm',   name:'מ"ר — מטר רבוע',        toSqM:1},
  {id:'sqkm',  name:'קמ"ר — קילומטר רבוע',   toSqM:1e6},
  {id:'sqcm',  name:'ס"מ רבוע',               toSqM:0.0001},
  {id:'sqmm',  name:'מ"מ רבוע',               toSqM:1e-6},
  {id:'sqmi',  name:'מייל מרובע',              toSqM:2589988.11},
  {id:'sqyd',  name:'יארד מרובע',              toSqM:0.836127},
  {id:'sqft',  name:'רגל מרובע (sq ft)',       toSqM:0.092903},
  {id:'sqin',  name:'אינץ\' מרובע (sq in)',    toSqM:0.00064516},
  {id:'ha',    name:'הקטאר',                   toSqM:10000},
  {id:'acre',  name:'אקר',                     toSqM:4046.856},
  {id:'dunam', name:'דונם',                    toSqM:1000},
  {id:'sqnm',  name:'מייל ימי מרובע',          toSqM:3429904}
];

let rates = {};
let rateDate = '';

async function loadRates() {
  try {
    const r = await fetch('https://cdn.jsdelivr.net/npm/@fawazahmed0/currency-api@latest/v1/currencies/usd.json');
    const d = await r.json();
    rates = d.usd;
    rateDate = d.date || '';
    document.getElementById('c-updated').textContent = rateDate ? 'עודכן: ' + rateDate : '';
    convertCurrency();
    renderQuickRates();
  } catch(e) {
    document.getElementById('c-result').innerHTML = '<span class="err">שגיאה בטעינת שערים — בדוק חיבור לאינטרנט</span>';
  }
}

function populateCurrencies() {
  const codes = Object.keys(CURRENCIES);
  ['c-from','c-to'].forEach((id, i) => {
    const sel = document.getElementById(id);
    codes.forEach(c => {
      const o = document.createElement('option');
      o.value = c;
      o.textContent = c + ' — ' + CURRENCIES[c];
      sel.appendChild(o);
    });
    sel.value = i === 0 ? 'USD' : 'ILS';
  });
}

function getRate(code) {
  const c = code.toLowerCase();
  if (c === 'usd') return 1;
  return rates[c] || null;
}

function convertCurrency() {
  if (!Object.keys(rates).length) return;
  const amt   = parseFloat(document.getElementById('c-amount').value) || 0;
  const from  = document.getElementById('c-from').value;
  const to    = document.getElementById('c-to').value;
  const fromR = getRate(from);
  const toR   = getRate(to);
  if (!fromR || !toR) return;
  const inUSD = amt / fromR;
  const result = inUSD * toR;
  const oneUnit = (1 / fromR) * toR;
  document.getElementById('c-result').textContent =
    result.toLocaleString('he-IL', {maximumFractionDigits: 4}) + ' ' + to;
  document.getElementById('c-res-label').textContent =
    amt.toLocaleString('he-IL') + ' ' + from + ' שווה ל:';
  document.getElementById('c-rate-info').textContent =
    '1 ' + from + ' = ' + oneUnit.toFixed(4) + ' ' + to;
}

function swapCurrency() {
  const f = document.getElementById('c-from'), t = document.getElementById('c-to');
  const tmp = f.value; f.value = t.value; t.value = tmp;
  convertCurrency();
}

function renderQuickRates() {
  const pairs = [['USD','ILS'],['EUR','ILS'],['GBP','ILS'],['USD','EUR'],['USD','JPY'],['EUR','USD']];
  document.getElementById('quick-rates').innerHTML = pairs.map(([f,t]) => {
    const r = ((1 / getRate(f)) * getRate(t)).toFixed(4);
    return `<div class="quick-card" onclick="document.getElementById('c-from').value='${f}';document.getElementById('c-to').value='${t}';convertCurrency()">
      <div class="quick-title">${f} → ${t}</div>
      <div class="quick-val">${r}</div>
      <div class="quick-sub">${CURRENCIES[f]}</div>
    </div>`;
  }).join('');
}

function populateAreaUnits() {
  ['a-from','a-to'].forEach((id, i) => {
    const sel = document.getElementById(id);
    AREA_UNITS.forEach(u => {
      const o = document.createElement('option');
      o.value = u.id; o.textContent = u.name;
      sel.appendChild(o);
    });
    sel.value = i === 0 ? 'sqm' : 'sqft';
  });
}

function convertArea() {
  const amt   = parseFloat(document.getElementById('a-amount').value) || 0;
  const fromU = AREA_UNITS.find(u => u.id === document.getElementById('a-from').value);
  const toU   = AREA_UNITS.find(u => u.id === document.getElementById('a-to').value);
  const result = amt * (fromU.toSqM / toU.toSqM);
  const factor = fromU.toSqM / toU.toSqM;
  document.getElementById('a-result').textContent =
    result.toLocaleString('he-IL', {maximumFractionDigits: 8}) + ' ' + toU.name.split(' — ')[0];
  document.getElementById('a-res-label').textContent =
    amt.toLocaleString('he-IL') + ' ' + fromU.name.split(' — ')[0] + ' שווה ל:';
  document.getElementById('a-formula').textContent =
    'מקדם המרה: × ' + factor.toLocaleString('he-IL', {maximumFractionDigits: 10});
}

function swapArea() {
  const f = document.getElementById('a-from'), t = document.getElementById('a-to');
  const tmp = f.value; f.value = t.value; t.value = tmp;
  convertArea();
}

function renderQuickAreas() {
  const pairs = [
    ['sqm','sqft'],['ha','dunam'],['acre','dunam'],['sqkm','sqmi'],
    ['dunam','sqm'],['sqft','sqm']
  ];
  document.getElementById('quick-areas').innerHTML = pairs.map(([f,t]) => {
    const fu = AREA_UNITS.find(u=>u.id===f), tu = AREA_UNITS.find(u=>u.id===t);
    const r = (fu.toSqM/tu.toSqM).toLocaleString('he-IL',{maximumFractionDigits:6});
    return `<div class="quick-card" onclick="document.getElementById('a-from').value='${f}';document.getElementById('a-to').value='${t}';convertArea()">
      <div class="quick-title">${fu.name.split(' — ')[0]} → ${tu.name.split(' — ')[0]}</div>
      <div class="quick-val">${r}</div>
      <div class="quick-sub">1 יחידה</div>
    </div>`;
  }).join('');
}

function switchTab(name) {
  document.querySelectorAll('.tab').forEach((t, i) =>
    t.classList.toggle('active', ['currency','area'][i] === name));
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  document.getElementById('panel-' + name).classList.add('active');
}

populateCurrencies();
populateAreaUnits();
convertArea();
renderQuickAreas();
loadRates();
</script>
</body>
</html>
